"$schema" = "./node_modules/wrangler/config-schema.json"
name = "mancala-arena"
main = "src/worker/index.js"
compatibility_date = "2026-04-28"

[assets]
directory = "./public/"
binding = "ASSETS"
run_worker_first = true

[[durable_objects.bindings]]
name = "GAME_ROOMS"
class_name = "GameRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = [ "GameRoom" ]
